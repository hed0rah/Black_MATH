<title>black-math</title>
<script>
// mathjax is the single renderer. fontCache 'local' makes every block's svg
// self-contained (own glyph paths) so it rasterizes standalone on a canvas.
window.MathJax = {
  loader: { load: ['[tex]/cancel', '[tex]/enclose', '[tex]/boldsymbol'] },
  tex: {
    inlineMath: [], displayMath: [],
    packages: { '[+]': ['cancel', 'enclose', 'boldsymbol'] },
    macros: { oiint: '\\unicode{x222F}', oiiint: '\\unicode{x2230}' }
  },
  svg: { fontCache: 'local', displayAlign: 'center', exFactor: 0.5 },
  startup: { typeset: false },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
};
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200&family=Space+Mono&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f5f3ee;
  --ink: #111;
  --dim: #aaa;
  --rule: #e0ddd8;
}

html, body { height: 100vh; overflow: hidden; background: var(--paper); color: var(--ink); }
body { display: flex; flex-direction: column; }

/* ---- header ---- */
header {
  flex: 0 0 auto; height: 36px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 1.5rem; gap: 1.2rem;
}
.h-title { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.18em; color: var(--ink); white-space: nowrap; }
.h-sym   { font-family: 'Noto Serif JP', serif; font-size: 0.85rem; color: var(--dim); letter-spacing: 0.06em; user-select: none; overflow: hidden; white-space: nowrap; }
.h-btns  { margin-left: auto; display: flex; gap: 1.1rem; align-items: center; flex-shrink: 0; }

/* ---- bars ---- */
.modes, .subbar {
  flex: 0 0 auto; min-height: 26px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 4px 1.5rem; gap: 1.1rem; flex-wrap: wrap;
}
.subbar { display: none; background: rgba(0,0,0,0.015); }
body[data-mode="overlap"] .subbar,
body[data-mode="animate"] .subbar,
body[data-mode="tile"] .subbar,
body[data-mode="columns"] .subbar,
body.op-on .subbar { display: flex; }
.grp { display: none; align-items: center; gap: 0.7rem; }
body[data-mode="overlap"] .grp-layer,
body[data-mode="animate"] .grp-layer { display: flex; }
body[data-mode="animate"] .grp-anim { display: flex; }
body[data-mode="tile"] .grp-grid,
body[data-mode="columns"] .grp-grid { display: flex; }
body.op-on .grp-op { display: flex; }
.modes-sep { width: 1px; height: 12px; background: var(--rule); }

/* ---- buttons (shared) ---- */
.btn, .mbtn {
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  color: var(--dim); background: none; border: none;
  cursor: pointer; padding: 0; line-height: 1;
  transition: color 0.1s; user-select: none;
}
.btn:hover, .mbtn:hover { color: var(--ink); }
.mbtn.on { color: var(--ink); border-bottom: 1px solid var(--ink); padding-bottom: 1px; }

.mval { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.05em; cursor: default; min-width: 1.4rem; }
.lbl  { font-family: 'Space Mono', monospace; font-size: 0.5rem; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }

.algo-sel, .sel {
  font-family: 'Space Mono', monospace; font-size: 0.55rem;
  color: var(--dim); background: transparent; border: 1px solid var(--rule);
  padding: 2px 4px; cursor: pointer; outline: none;
  letter-spacing: 0.05em; text-transform: lowercase;
}
.algo-sel:hover, .sel:hover { color: var(--ink); border-color: var(--ink); }
.algo-sel option, .sel option { background: var(--paper); color: var(--ink); }

.seed-badge {
  font-family: 'Space Mono', monospace; font-size: 0.55rem;
  color: var(--dim); letter-spacing: 0.08em;
  border: 1px solid var(--rule); padding: 2px 5px; cursor: pointer; user-select: none;
  transition: color 0.1s, border-color 0.1s;
}
.seed-badge:hover, .seed-badge.flash { color: var(--ink); border-color: var(--ink); }

/* sliders */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 56px; height: 1px; background: var(--rule); outline: none; cursor: pointer; border: none;
}
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 7px; height: 7px; background: var(--dim); border-radius: 50%; }
input[type=range]:hover::-webkit-slider-thumb { background: var(--ink); }
input[type=range].w { width: 80px; }

.status { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.08em; min-width: 3.5rem; text-align: right; }

/* ---- layout ---- */
main { flex: 1 1 0; display: grid; grid-template-columns: 360px 1px 1fr; min-height: 0; }
.pane { min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.pane-edit { padding: 1.2rem 1.5rem; }
.divider { background: var(--rule); }

#editor {
  flex: 1 1 0; min-height: 0; border: none; outline: none; resize: none;
  background: transparent; font-family: 'Space Mono', monospace;
  font-size: 0.72rem; line-height: 1.9; color: var(--ink); caret-color: var(--ink);
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--rule) transparent;
}
#editor::placeholder { color: var(--dim); }
#editor::-webkit-scrollbar { width: 2px; }
#editor::-webkit-scrollbar-thumb { background: var(--rule); }

/* ---- canvas / virtual sheet ---- */
.pane-preview { align-items: center; justify-content: center; padding: 1.5rem; background: var(--paper); }
#canvas {
  box-shadow: 0 1px 8px rgba(0,0,0,0.10); border: 1px solid var(--rule);
  display: block; max-width: 100%; max-height: 100%;
}
body[data-mode="poster"] #canvas, body[data-mode="overlap"] #canvas { cursor: crosshair; }

.err { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: #a03020; }

/* ---- fullscreen ---- */
body.fs main { grid-template-columns: 0 0 1fr; }
body.fs .pane-edit, body.fs .divider { display: none; }

/* ---- print: only the rendered sheet image, sized exactly to the page ---- */
#print-layer { display: none; }
@media print {
  body > *:not(#print-layer) { display: none !important; }
  html, body { height: auto !important; overflow: visible !important; background: #fff !important; }
  #print-layer { display: block !important; position: fixed; inset: 0; margin: 0; overflow: hidden; break-inside: avoid; }
  #print-layer img { width: 100%; height: 100%; max-width: 100%; max-height: 100%; object-fit: fill; display: block; break-inside: avoid; }
}
</style>

<script>
// ====================================================================
// black-math : canvas compositor. one render surface feeds screen,
// print, and export. generator is preserved below verbatim.
// ====================================================================

const editor  = document.getElementById('editor');
const canvas  = document.getElementById('canvas');
const status  = document.getElementById('status');
const fsbtn   = document.getElementById('fs-btn');
const ctx     = canvas.getContext('2d');
const DPR     = Math.min(2, window.devicePixelRatio || 1);

// ---- paper sizes (physical) ----
const PAPERS = {
  letter:  { label: 'letter',  w: 8.5, h: 11,  unit: 'in' },
  a4:      { label: 'a4',      w: 210, h: 297, unit: 'mm' },
  thermal: { label: '4x6 thermal', w: 4, h: 6, unit: 'in' }
};
const BLENDS = ['darken','multiply','source-over','screen','lighten'];
const BLEND_LABEL = { 'darken':'darken','multiply':'multiply','source-over':'normal','screen':'screen','lighten':'lighten' };
const ANIM_TYPES = ['drift','accrete','pulse','swarm','spin','sweep'];
const ARRANGES = ['linear','radial','scatter'];

// ---- presentation state (persisted) ----
let mode        = 'document';   // document | tile | columns | overlap | poster | animate
let paper       = 'letter';
let orientation = 'portrait';
let invert      = false;
let thermal     = false;
let mirrorH     = false;
let mirrorV     = false;
let rotation    = 0;
let userScale   = 1;
let gridRows    = 2;
let gridCols    = 2;
let gridGap     = 0;      // % of cell; negative pushes cells together / overlaps
let gridFill    = 0.92;   // how much of each cell the content fills (>1 bleeds)
let layer       = { count: 24, angle: 56, spread: 6, rot: 0, scaleStep: 1, jit: 0.4, scale: 0.7, opacity: 1, blend: 'darken', arrange: 'linear' };
let anim        = { type: 'drift', speed: 1 };
let overprint   = { on: false, marks: true, offX: 0, offY: 0 };
let viewport    = { zoom: 1, panX: 0, panY: 0 };   // camera over the whole composition
let printCount  = 0;                               // prints sent this session

// ---- compositor scratch ----
let cssW = 0, cssH = 0;          // on-screen sheet size in css px
let g = ctx, GW = 0, GH = 0;     // current draw target + dims
let RECORD = false;              // when true, blit() records placements for svg export
let recPlacements = [];
let currentBlocks = [];          // latex strings currently shown
const SEED = `$$
\\begin{vmatrix} \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} \\\\ \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} \\\\ \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} \\\\ \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} \\\\ \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} & \\Omega^{\\Omega^{\\Omega}} & \\aleph_{\\aleph_{\\aleph}} \\end{vmatrix}^{\\begin{vmatrix} \\aleph_{\\aleph} & \\Omega^{\\Omega} & \\aleph_{\\aleph} \\\\ \\Omega^{\\Omega} & \\aleph_{\\aleph} & \\Omega^{\\Omega} \\\\ \\aleph_{\\aleph} & \\Omega^{\\Omega} & \\aleph_{\\aleph} \\end{vmatrix}^{\\begin{vmatrix} \\aleph & \\Omega \\\\ \\Omega & \\aleph \\end{vmatrix}^{\\cdots}}}
$$

$$
\\underbrace{\\overbrace{\\underbrace{\\overbrace{\\underbrace{\\overbrace{\\underbrace{\\overbrace{\\underbrace{\\overbrace{\\Xi\\otimes\\Xi\\otimes\\Xi\\otimes\\Xi\\otimes\\Xi\\otimes\\Xi\\otimes\\Xi\\otimes\\Xi}^{\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega}}_{\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph}}^{\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega}}_{\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph}}^{\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega}}_{\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph}}^{\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega}}_{\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph}}^{\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega\\Omega}}_{\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph\\aleph}
$$

$$
\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\sqrt{\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint\\oint}}}}}}}}}}}}
$$

$$
\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}}}}}}}}} \\otimes \\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}}}}}}}}} \\otimes \\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}_{\\ddot{\\hat{\\tilde{\\bar{\\vec{\\mathfrak{X}}}}}}}}}}}}}}
$$`;

// ---- extract $$ blocks ----
function extractBlocks(src) {
  const out = [];
  const re = /\$\$([\s\S]*?)\$\$/g;
  let m;
  while ((m = re.exec(src)) !== null) { const t = m[1].trim(); if (t) out.push(t); }
  return out;
}

// ---- render cache : latex -> { img, w, h, vb, inner } ----
const RASTER_EM = 96;
const cache = new Map();

async function ensureBlock(latex) {
  if (cache.has(latex)) return cache.get(latex);
  await MathJax.startup.promise;
  let entry = { error: true, latex };
  try {
    const node = MathJax.tex2svg(latex, { display: true });
    const probe = document.createElement('div');
    probe.style.cssText = 'position:absolute;left:-99999px;top:-99999px;visibility:hidden;font-size:' + RASTER_EM + 'px;line-height:0;';
    probe.appendChild(node);
    document.body.appendChild(probe);
    const svgEl = node.querySelector('svg');
    if (svgEl && !svgEl.querySelector('[data-mml-node="merror"]')) {
      const r = svgEl.getBoundingClientRect();
      const w = Math.max(2, Math.round(r.width));
      const h = Math.max(2, Math.round(r.height));
      svgEl.setAttribute('width', w);
      svgEl.setAttribute('height', h);
      svgEl.removeAttribute('style');
      const vb = svgEl.getAttribute('viewBox') || ('0 0 ' + w + ' ' + h);
      const inner = svgEl.innerHTML;
      const svgStr = new XMLSerializer().serializeToString(svgEl);
      document.body.removeChild(probe);
      const img = new Image();
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      await new Promise((res) => { img.onload = () => res(); img.onerror = () => res(); img.src = url; });
      URL.revokeObjectURL(url);
      entry = { img, w, h, vb, inner, latex };
    } else {
      document.body.removeChild(probe);
    }
  } catch (e) {
    entry = { error: true, latex, msg: e.message };
  }
  cache.set(latex, entry);
  return entry;
}

// inverted (white-on-transparent) variant for true-negative mode, built lazily
function invVariant(b) {
  if (b._inv) return b._inv;
  const c = document.createElement('canvas');
  c.width = b.w; c.height = b.h;
  const x = c.getContext('2d');
  x.filter = 'invert(1)';
  x.drawImage(b.img, 0, 0);
  b._inv = c;
  return b._inv;
}

// ---- render : rebuild cache for current blocks, then draw ----
let renderToken = 0;
async function render() {
  const blocks = extractBlocks(editor.value);
  currentBlocks = blocks;
  persist();
  if (!blocks.length) { draw(); status.textContent = ''; return; }
  const token = ++renderToken;
  status.textContent = '…';
  const uniq = [...new Set(blocks)];
  const results = await Promise.all(uniq.map(ensureBlock));
  if (token !== renderToken) return;          // a newer render superseded this one
  const errs = results.filter(r => r.error).length;
  status.textContent = blocks.length + (errs ? ' !' + errs : '');
  draw();
}

let timer = null;
editor.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(render, 300); });

// ---- sheet geometry ----
function paperDims() {
  const p = PAPERS[paper] || PAPERS.letter;
  let w = p.w, h = p.h;
  if (orientation === 'landscape') { const t = w; w = h; h = t; }
  const toIn = p.unit === 'mm' ? 1 / 25.4 : 1;
  return { win: w * toIn, hin: h * toIn };
}

function layoutSheet() {
  const pane = canvas.parentElement;
  const pad = 8;
  const availW = Math.max(40, pane.clientWidth - pad * 2);
  const availH = Math.max(40, pane.clientHeight - pad * 2);
  const { win, hin } = paperDims();
  const aspect = win / hin;
  let sw = availW, sh = sw / aspect;
  if (sh > availH) { sh = availH; sw = sh * aspect; }
  return { sw, sh };
}

function resizeCanvas() {
  const { sw, sh } = layoutSheet();
  cssW = sw; cssH = sh;
  canvas.style.width = sw + 'px';
  canvas.style.height = sh + 'px';
  canvas.width = Math.round(sw * DPR);
  canvas.height = Math.round(sh * DPR);
}

function bgColor() {
  if (invert) return '#000';
  return thermal ? '#fff' : '#f5f3ee';
}

// ---- deterministic per-instance jitter (tied to current seed) ----
function hash01(n) {
  let s = (Math.imul(n, 2654435761) ^ prngSeed) >>> 0;
  s = Math.imul(s ^ (s >>> 15), s | 1);
  s ^= s + Math.imul(s ^ (s >>> 7), s | 61);
  return ((s ^ (s >>> 14)) >>> 0) / 4294967296;
}
function jrand(n) { return hash01(n) * 2 - 1; }

function fitScale(b, W, H, frac) { return Math.min((W * frac) / b.w, (H * frac) / b.h); }

// blend flips so density accumulates toward the ink color in either theme
function adjBlend(bl) {
  if (invert) { if (bl === 'darken') return 'lighten'; if (bl === 'multiply') return 'screen'; }
  return bl;
}

// ---- the one primitive : place a cached block. draws to canvas, or records for svg ----
function blit(b, x, y, w, h, opt) {
  opt = opt || {};
  const alpha = opt.alpha == null ? 1 : opt.alpha;
  const blend = opt.blend || 'source-over';
  const rot = opt.rot || 0;
  if (RECORD) { recPlacements.push({ b, x, y, w, h, alpha, blend, rot }); return; }
  const src = invert ? invVariant(b) : b.img;
  g.save();
  g.globalAlpha = alpha;
  g.globalCompositeOperation = blend;
  if (rot) {
    const cx = x + w / 2, cy = y + h / 2;
    g.translate(cx, cy); g.rotate(rot * Math.PI / 180); g.translate(-cx, -cy);
  }
  g.drawImage(src, x, y, w, h);
  g.restore();
}

// ---- compose : fill bg, apply global transform, dispatch to layout ----
function compose() {
  const blocks = currentBlocks.map(l => cache.get(l)).filter(b => b && !b.error && b.img);
  if (!RECORD) { g.clearRect(0, 0, GW, GH); g.fillStyle = bgColor(); g.fillRect(0, 0, GW, GH); }
  if (!blocks.length) return;
  if (!RECORD) { g.save(); applyGlobalTransform(g, GW, GH); }
  switch (mode) {
    case 'tile':    drawTile(blocks, GW, GH); break;
    case 'columns': drawColumns(blocks, GW, GH); break;
    case 'overlap': drawOverlap(blocks, GW, GH); break;
    case 'poster':  drawPoster(blocks, GW, GH); break;
    case 'animate': drawAnimate(blocks, GW, GH); break;
    default:        drawDocument(blocks, GW, GH);
  }
  if (!RECORD) g.restore();
  if (overprint.on && overprint.marks) drawMarks(GW, GH);
}

function applyGlobalTransform(c, W, H) {
  // viewport camera (zoom + pan) sits outermost, over the whole composition
  c.translate(W / 2, H / 2);
  c.scale(viewport.zoom, viewport.zoom);
  c.translate(-W / 2 + viewport.panX * W, -H / 2 + viewport.panY * H);
  c.translate(W / 2, H / 2);
  c.rotate(rotation * Math.PI / 180);
  c.scale(mirrorH ? -1 : 1, mirrorV ? -1 : 1);
  c.translate(-W / 2, -H / 2);
  if (overprint.on) c.translate(overprint.offX / 100 * W, overprint.offY / 100 * H);
}

function draw() {
  resizeCanvas();
  g = ctx; GW = cssW; GH = cssH;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  RECORD = false;
  compose();
}

function composeTo(targetCtx, W, H) {
  const sg = g, sGW = GW, sGH = GH;
  g = targetCtx; GW = W; GH = H; RECORD = false;
  targetCtx.setTransform(1, 0, 0, 1, 0, 0);
  compose();
  g = sg; GW = sGW; GH = sGH;
}

// ---- layout : document (stacked, fit to sheet) ----
const REF_EMS = 22;   // ~this many ems fit across the sheet at scale 1
function drawStackInRect(blocks, x, y, w, h, fill) {
  fill = fill == null ? 0.92 : fill;
  const gap = h * 0.03;
  let items = blocks.map(b => {
    const target = Math.min((b.w / RASTER_EM) * (w / REF_EMS) * userScale, w * 8) * fill;
    return { b, dw: target, dh: target * (b.h / b.w) };
  });
  let total = items.reduce((a, it) => a + it.dh, 0) + gap * Math.max(0, items.length - 1);
  const maxH = h * (fill > 1 ? fill : 1);
  const shrink = total > maxH ? maxH / total : 1;
  let cy = y + (h - total * shrink) / 2;
  items.forEach(it => {
    const dw = it.dw * shrink, dh = it.dh * shrink;
    blit(it.b, x + (w - dw) / 2, cy, dw, dh, { blend: adjBlend('source-over') });
    cy += dh + gap * shrink;
  });
}

function drawDocument(blocks, W, H) {
  const pad = W * 0.06;
  drawStackInRect(blocks, pad, pad, W - pad * 2, H - pad * 2);
}

function drawTile(blocks, W, H) {
  const rows = gridRows, cols = gridCols, cw = W / cols, ch = H / rows;
  const ix = (gridGap / 100) * cw / 2, iy = (gridGap / 100) * ch / 2;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      drawStackInRect(blocks, c * cw + ix, r * ch + iy, cw - 2 * ix, ch - 2 * iy, gridFill);
}

function drawColumns(blocks, W, H) {
  const n = gridCols, pad = W * 0.03, gap = W * 0.015;
  const colW = (W - pad * 2 - gap * (n - 1)) / n;
  const ix = (gridGap / 100) * colW / 2;
  const cols = Array.from({ length: n }, () => []);
  const heights = new Array(n).fill(0);
  blocks.forEach(b => {
    const i = heights.indexOf(Math.min(...heights));
    cols[i].push(b);
    heights[i] += (b.h / b.w) * colW * gridFill + colW * 0.06;
  });
  cols.forEach((cb, i) => {
    if (cb.length) drawStackInRect(cb, pad + i * (colW + gap) - ix, pad, colW + 2 * ix, H - pad * 2, gridFill);
  });
}

function drawPoster(blocks, W, H) {
  const b = blocks[0];
  const pad = Math.min(W, H) * 0.04;
  const s = Math.min((W - pad * 2) / b.w, (H - pad * 2) / b.h) * Math.min(1.4, userScale);
  const w = b.w * s, h = b.h * s;
  blit(b, (W - w) / 2, (H - h) / 2, w, h, { blend: adjBlend('source-over') });
}

// ---- the layer engine : arrangement (linear / radial / scatter) + density ----
// returns center-based placement for instance i. offset is angle+spread (linear),
// a ring (radial), or seeded scatter. rot is a total span fanned across the stack
// so rot=0 leaves every layer parallel.
function layerXform(i, count, b, W, H, twist) {
  const L = layer, cx = W / 2, cy = H / 2;
  const zoom = Math.pow(L.scaleStep, i - (count - 1) / 2);
  const s = fitScale(b, W, H, 0.62) * L.scale * zoom * (1 + jrand(i * 3) * L.jit * 0.5);
  const jx = jrand(i * 3 + 1) * L.jit * W * 0.15;
  const jy = jrand(i * 3 + 2) * L.jit * H * 0.15;
  const jr = jrand(i * 3) * L.jit * 40;
  const span = count <= 1 ? 0 : (i / (count - 1) - 0.5);
  let x, y, rot;
  if (L.arrange === 'radial') {
    const ang = (i / Math.max(1, count)) * Math.PI * 2 + (twist || 0);
    const rad = (L.spread / 100) * Math.min(W, H);
    x = cx + Math.cos(ang) * rad + jx;
    y = cy + Math.sin(ang) * rad + jy;
    rot = ang * 180 / Math.PI + L.rot + jr;
  } else if (L.arrange === 'scatter') {
    x = cx + jrand(i * 5 + 1) * W * 0.28 + jx;
    y = cy + jrand(i * 5 + 2) * H * 0.28 + jy;
    rot = jrand(i * 5) * (L.rot || 40) + jr;
  } else { // linear
    const a = L.angle * Math.PI / 180;
    const dist = (i - (count - 1) / 2) * (L.spread / 100) * Math.min(W, H);
    x = cx + Math.cos(a) * dist + jx;
    y = cy + Math.sin(a) * dist + jy;
    rot = span * L.rot + jr;
  }
  return { s, x, y, rot };
}

function drawOverlap(blocks, W, H) {
  const L = layer, blend = adjBlend(L.blend);
  for (let i = 0; i < L.count; i++) {
    const b = blocks[i % blocks.length];
    const t = layerXform(i, L.count, b, W, H, 0);
    const w = b.w * t.s, h = b.h * t.s;
    blit(b, t.x - w / 2, t.y - h / 2, w, h, { alpha: L.opacity, blend, rot: t.rot });
  }
}

// ---- animation : motion variants, current frame is what prints ----
let animT = 0, animRAF = null, animPaused = false;
// animation builds on the layer arrangement, then perturbs it over time.
function drawAnimate(blocks, W, H) {
  const L = layer, t = animT, cx = W / 2, cy = H / 2, blend = adjBlend(L.blend);
  let count = L.count;
  if (anim.type === 'accrete') count = Math.max(1, Math.floor((Math.sin(t * 0.3) * 0.5 + 0.5) * L.count) + 1);
  for (let i = 0; i < count; i++) {
    const b = blocks[i % blocks.length];
    const base = layerXform(i, count, b, W, H, anim.type === 'spin' ? t * 0.3 : 0);
    let s = base.s, x = base.x, y = base.y, rot = base.rot;
    const ph = i * 0.6;
    if (anim.type === 'drift') { x += Math.cos(t * 0.5 + ph) * W * 0.10; y += Math.sin(t * 0.4 + ph * 1.3) * H * 0.10; rot += t * 8; }
    else if (anim.type === 'pulse') { s *= 1 + 0.25 * Math.sin(t + ph); }
    else if (anim.type === 'swarm') { const rr = 30 + i * 2; x += Math.cos(t * 0.7 + ph) * rr; y += Math.sin(t * 0.9 + ph) * rr; rot += t * 20; }
    else if (anim.type === 'spin') { rot += t * 30; }
    else if (anim.type === 'sweep') { const k = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * 0.6)); x = cx + (x - cx) * k * 2; y = cy + (y - cy) * k * 2; }
    const w = b.w * s, h = b.h * s;
    blit(b, x - w / 2, y - h / 2, w, h, { alpha: L.opacity, blend, rot });
  }
}
function animLoop() {
  if (mode !== 'animate') { animRAF = null; return; }
  if (!animPaused) animT += anim.speed * 0.016;
  draw();
  animRAF = requestAnimationFrame(animLoop);
}
function startAnim() { if (!animRAF) animLoop(); }
function stopAnim() { if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; } }
function toggleAnimPause() {
  animPaused = !animPaused;
  document.getElementById('btn-pause').textContent = animPaused ? '⏵' : '⏸';
}

// ---- registration marks ----
function drawMarks(W, H) {
  const m = Math.min(W, H) * 0.045;
  const col = invert ? '#888' : '#999';
  const lw = Math.max(1, W * 0.0015);
  const corners = [[0, 0, 1, 1], [W, 0, -1, 1], [0, H, 1, -1], [W, H, -1, -1]];
  if (RECORD) {
    corners.forEach(([x, y, sx, sy]) => {
      recPlacements.push({ mark: true, x, y, sx, sy, m, col, lw });
    });
    return;
  }
  g.save();
  g.strokeStyle = col; g.lineWidth = lw; g.globalAlpha = 0.8;
  corners.forEach(([x, y, sx, sy]) => {
    g.beginPath();
    g.moveTo(x, y + sy * m); g.lineTo(x, y); g.lineTo(x + sx * m, y);
    g.stroke();
  });
  g.restore();
}

// ==================== MODE / MODIFIER CONTROLS ====================
function setLayout(m) {
  if (mode === 'animate' && m !== 'animate') stopAnim();
  mode = m;
  document.body.dataset.mode = m;
  document.querySelectorAll('[data-layout]').forEach(b => b.classList.toggle('on', b.dataset.layout === m));
  if (m === 'animate') startAnim(); else draw();
  persist();
}

function cycleTile() { setLayout('tile'); }
function cycleCols() { setLayout('columns'); }

function toggleInvert() {
  invert = !invert;
  document.getElementById('btn-inv').classList.toggle('on', invert);
  draw(); persist();
}
function toggleThermal() {
  thermal = !thermal;
  document.getElementById('btn-thermal').classList.toggle('on', thermal);
  draw(); persist();
}
function toggleMirrorH() {
  mirrorH = !mirrorH;
  document.getElementById('btn-mh').classList.toggle('on', mirrorH);
  draw(); persist();
}
function toggleMirrorV() {
  mirrorV = !mirrorV;
  document.getElementById('btn-mv').classList.toggle('on', mirrorV);
  draw(); persist();
}
function cycleRotate() {
  rotation = (rotation + 90) % 360;
  const v = document.getElementById('val-rot'), b = document.getElementById('btn-rot');
  if (rotation === 0) { v.style.display = 'none'; b.classList.remove('on'); }
  else { v.textContent = rotation + '°'; v.style.display = ''; b.classList.add('on'); }
  draw(); persist();
}
function toggleOverprint() {
  overprint.on = !overprint.on;
  document.getElementById('btn-op').classList.toggle('on', overprint.on);
  document.body.classList.toggle('op-on', overprint.on);

}
function toggleMarks() {

  document.getElementById('btn-marks').classList.toggle('on', overprint.marks);
  draw(); persist();
}
function toggleOrient() {
  orientation = orientation === 'portrait' ? 'landscape' : 'portrait';
  document.getElementById('btn-orient').textContent = orientation === 'portrait' ? 'P' : 'L';
  draw(); persist();
}

// ---- click a block region in poster/overlap to pick the focused block ----
canvas.addEventListener('click', (e) => {
  if (mode !== 'poster') return;
  // poster always shows block 0; clicking rotates which block is focused
  if (currentBlocks.length > 1) {
    currentBlocks.push(currentBlocks.shift());
    draw();
  }
});

// ---- viewport camera : zoom (wheel / slider) + pan (drag) + auto-frame ----
function clampZoom(z) { return Math.max(0.1, Math.min(16, z)); }
function resetViewport() {
  viewport.zoom = 1; viewport.panX = 0; viewport.panY = 0;
  setRange('zoom', 1); draw(); persist();
}
// frame tightly to the inked content: render once at identity, find the ink
// bounding box, then set zoom/pan so it fills the sheet.
function autoFrame() {
  const W = cssW, H = cssH;
  if (!W || !H || !currentBlocks.length) return;
  const tmp = document.createElement('canvas'); tmp.width = W; tmp.height = H;
  const tctx = tmp.getContext('2d');
  const saved = { zoom: viewport.zoom, panX: viewport.panX, panY: viewport.panY };
  viewport.zoom = 1; viewport.panX = 0; viewport.panY = 0;
  composeTo(tctx, W, H);
  viewport.zoom = saved.zoom; viewport.panX = saved.panX; viewport.panY = saved.panY;
  const bg = invert ? [0, 0, 0] : (thermal ? [255, 255, 255] : [245, 243, 238]);
  const d = tctx.getImageData(0, 0, W, H).data;
  let minX = W, minY = H, maxX = 0, maxY = 0, found = false;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const i = (y * W + x) * 4;
    if (Math.abs(d[i] - bg[0]) + Math.abs(d[i + 1] - bg[1]) + Math.abs(d[i + 2] - bg[2]) > 40) {
      found = true;
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  if (!found) return;
  const bw = Math.max(1, maxX - minX), bh = Math.max(1, maxY - minY);
  viewport.zoom = clampZoom(Math.min(W / (bw * 1.08), H / (bh * 1.08)));
  viewport.panX = (W / 2 - (minX + maxX) / 2) / W;
  viewport.panY = (H / 2 - (minY + maxY) / 2) / H;
  setRange('zoom', viewport.zoom); draw(); persist();
}
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  viewport.zoom = clampZoom(viewport.zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12));
  setRange('zoom', viewport.zoom); draw(); persist();
}, { passive: false });
let vpDrag = null;
canvas.addEventListener('pointerdown', (e) => {
  if (mode === 'poster') return;
  vpDrag = { x: e.clientX, y: e.clientY, px: viewport.panX, py: viewport.panY };
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  if (!vpDrag) return;
  viewport.panX = vpDrag.px + (e.clientX - vpDrag.x) / (viewport.zoom * cssW);
  viewport.panY = vpDrag.py + (e.clientY - vpDrag.y) / (viewport.zoom * cssH);
  draw();
});
canvas.addEventListener('pointerup', () => { if (vpDrag) { vpDrag = null; persist(); } });
canvas.addEventListener('dblclick', resetViewport);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('fs')) toggleFs();
});

// ==================== PERSISTENCE + HISTORY ====================
const LS = 'blackmath-v3';
function persist() {
  try {
    localStorage.setItem(LS, JSON.stringify({
      text: editor.value, mode, paper, orientation, invert, thermal,
      mirrorH, mirrorV, rotation, scale: userScale, spice: SPICE,
      gridRows, gridCols, gridGap, gridFill, layer, anim, overprint, viewport, seed: prngSeed
    }));
  } catch (e) {}
}
function restore() {
  try {
    const s = JSON.parse(localStorage.getItem(LS));
    if (!s) return false;
    if (s.text != null) editor.value = s.text;
    mode = s.mode || 'document';
    paper = s.paper || 'letter';
    orientation = s.orientation || 'portrait';
    invert = !!s.invert; thermal = !!s.thermal;
    mirrorH = !!s.mirrorH; mirrorV = !!s.mirrorV;
    rotation = s.rotation || 0;
    userScale = s.scale || 1;
    SPICE = s.spice || 1;
    gridRows = s.gridRows || 2; gridCols = s.gridCols || 2;
    gridGap = s.gridGap || 0; gridFill = s.gridFill || 0.92;
    if (s.layer) Object.assign(layer, s.layer);
    if (s.anim) Object.assign(anim, s.anim);
    if (s.overprint) Object.assign(overprint, s.overprint);
    if (s.viewport) Object.assign(viewport, s.viewport);
    if (s.seed != null) { prngSeed = s.seed >>> 0; rng = mulberry32(prngSeed); }
    return s.text != null && s.text.trim().length > 0;
  } catch (e) { return false; }
}

const history = [];
function pushHistory() { history.push(editor.value); if (history.length > 40) history.shift(); }
function undo() {
  if (!history.length) return;
  editor.value = history.pop();
  render();
}

// ==================== GENERATE (validated) ====================
// every candidate is test-rendered before it is added, so generation always
// produces visible art instead of silently dropping invalid expressions.
async function genBlocks(n, fresh) {
  if (fresh) editor.value = '';
  newSeed();
  const out = [];
  let tries = 0;
  while (out.length < n && tries < n * 8) {
    tries++;
    let latex;
    try { latex = generateBlock(); } catch (e) { continue; }
    const entry = await ensureBlock(latex);
    if (entry && !entry.error && entry.img) out.push(latex);
  }
  if (out.length) appendBlocks(out.map(l => `$$\n${l}\n$$`));
}
function genFresh()  { pushHistory(); flashBtn('btn-gen'); genBlocks(rnd(2, 4), true); }
function genAppend() { pushHistory(); flashBtn('btn-app'); genBlocks(rnd(1, 3), false); }

// ==================== CONTROL WIRING ====================
function setRange(id, val) { const el = document.getElementById(id); if (el) el.value = val; }
function fillSelect(id, items, current, labelFn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = items.map(v => `<option value="${v}"${v === current ? ' selected' : ''}>${labelFn ? labelFn(v) : v}</option>`).join('');
}

function syncUI() {
  document.body.dataset.mode = mode;
  document.querySelectorAll('[data-layout]').forEach(b => b.classList.toggle('on', b.dataset.layout === mode));
  document.getElementById('btn-inv').classList.toggle('on', invert);
  document.getElementById('btn-thermal').classList.toggle('on', thermal);
  document.getElementById('btn-mh').classList.toggle('on', mirrorH);
  document.getElementById('btn-mv').classList.toggle('on', mirrorV);
  document.getElementById('btn-op').classList.toggle('on', overprint.on);
  document.getElementById('btn-marks').classList.toggle('on', overprint.marks);
  document.body.classList.toggle('op-on', overprint.on);
  document.getElementById('btn-orient').textContent = orientation === 'portrait' ? 'P' : 'L';
  if (rotation !== 0) { const v = document.getElementById('val-rot'); v.textContent = rotation + '°'; v.style.display = ''; document.getElementById('btn-rot').classList.add('on'); }
  setRange('spice', SPICE); setRange('scale', userScale); setRange('zoom', viewport.zoom);
  if (printCount) document.getElementById('print-count').textContent = '×' + printCount;
  setRange('L-count', layer.count); setRange('L-angle', layer.angle); setRange('L-spread', layer.spread);
  setRange('L-rot', layer.rot); setRange('L-scalestep', layer.scaleStep); setRange('L-jit', layer.jit);
  setRange('L-scale', layer.scale); setRange('L-opacity', layer.opacity); setRange('A-speed', anim.speed);
  setRange('G-rows', gridRows); setRange('G-cols', gridCols); setRange('G-gap', gridGap); setRange('G-fill', gridFill);
  setRange('OP-offx', overprint.offX); setRange('OP-offy', overprint.offY);
  fillSelect('paper-sel', Object.keys(PAPERS), paper, k => PAPERS[k].label);
  fillSelect('L-blend', BLENDS, layer.blend, v => BLEND_LABEL[v]);
  fillSelect('L-arrange', ARRANGES, layer.arrange);
  fillSelect('A-type', ANIM_TYPES, anim.type);
}

function wireControls() {
  const on = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };
  on('spice', 'input', e => { SPICE = parseFloat(e.target.value); persist(); });
  on('scale', 'input', e => { userScale = parseFloat(e.target.value); draw(); persist(); });
  on('zoom', 'input', e => { viewport.zoom = parseFloat(e.target.value); draw(); persist(); });
  on('paper-sel', 'change', e => { paper = e.target.value; draw(); persist(); });
  on('L-count', 'input', e => { layer.count = parseInt(e.target.value); draw(); persist(); });
  on('L-angle', 'input', e => { layer.angle = parseFloat(e.target.value); draw(); persist(); });

// ---- RANDOM GENERATOR ----
// recursive expression grammar, weighted productions, seedable PRNG, spice, personalities, themes, crossover

// PRNG (mulberry32) — deterministic given a seed
let prngSeed = (Math.random() * 4294967296) >>> 0;
function mulberry32(s) {
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let rng = mulberry32(prngSeed);
function rand() { return rng(); }

function setSeed(s) {
  prngSeed = (s >>> 0);
  rng = mulberry32(prngSeed);
  updateSeedDisplay();
}
function newSeed() { setSeed((Math.random() * 4294967296) >>> 0); }
function updateSeedDisplay() {
  const el = document.getElementById('seed-badge');
  if (el) el.textContent = prngSeed.toString(16).padStart(8, '0');
}

let seedClickTimer = null;
function onSeedClick() {
  if (seedClickTimer) return;
  seedClickTimer = setTimeout(() => {
    navigator.clipboard.writeText(prngSeed.toString(16)).then(() => {
      const el = document.getElementById('seed-badge');
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 600);
    });
    seedClickTimer = null;
  }, 250);
}
function onSeedDblClick() {
  clearTimeout(seedClickTimer);
  seedClickTimer = null;
  const v = prompt('seed (hex)', prngSeed.toString(16));
  if (v) {
    const n = parseInt(v, 16);
    if (!isNaN(n)) setSeed(n);
  }
}

// helpers — all use seeded rng
function rnd(a,b)   { return Math.floor(rand()*(b-a+1))+a; }
function pick(arr)  { return arr[Math.floor(rand()*arr.length)]; }
function maybe(p)   { return rand() < p; }
function rep(s,n)   { return Array(n).fill(s).join(''); }
function pickN(arr, n) {
  const copy = [...arr];
  const out = [];
  while (out.length < n && copy.length) out.push(copy.splice(Math.floor(rand()*copy.length), 1)[0]);
  return out;
}
function wpick(items, weights) {
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = rand() * total;
  for (let i = 0; i < items.length; i++) { r -= weights[i]; if (r <= 0) return items[i]; }
  return items[items.length-1];
}

// spice — capped to keep rendering tractable
let SPICE = 1.0;
function depth(base) { return Math.max(1, Math.min(8, Math.round(base * Math.min(1.5, SPICE)))); }

// global node budget — prevents combinatorial blowup when matrices/chains nest.
// reset before each top-level shape; expr() decrements and falls through to atom() when exhausted.
let exprBudget = 0;

// ---- ATOM POOL ----
const GREEK_LOWER = ['\\alpha','\\beta','\\gamma','\\delta','\\epsilon','\\varepsilon','\\zeta','\\eta','\\theta','\\vartheta','\\iota','\\kappa','\\lambda','\\mu','\\nu','\\xi','\\pi','\\varpi','\\rho','\\varrho','\\sigma','\\varsigma','\\tau','\\upsilon','\\phi','\\varphi','\\chi','\\psi','\\omega'];
const GREEK_UPPER = ['\\Gamma','\\Delta','\\Theta','\\Lambda','\\Xi','\\Pi','\\Sigma','\\Upsilon','\\Phi','\\Psi','\\Omega'];
const HEBREW = ['\\aleph','\\beth','\\gimel','\\daleth'];
const SPECIAL = ['\\nabla','\\partial','\\infty','\\emptyset','\\varnothing','\\forall','\\exists','\\nexists','\\top','\\bot','\\heartsuit','\\diamondsuit','\\clubsuit','\\spadesuit','\\dagger','\\ddagger','\\hbar','\\ell','\\wp','\\Re','\\Im','\\mho','\\eth','\\Game','\\Finv','\\backepsilon'];
const FRAK = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'.split('').map(c => `\\mathfrak{${c}}`);
const CAL  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(c => `\\mathcal{${c}}`);
const BBOLD = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(c => `\\mathbb{${c}}`);
const SF   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'.split('').map(c => `\\mathsf{${c}}`);
const TT   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'.split('').map(c => `\\mathtt{${c}}`);
const BIGOP_ATOMS = ['\\int','\\oint','\\iint','\\iiint','\\oiint','\\prod','\\sum','\\bigotimes','\\bigoplus'];

let ATOMS = [...GREEK_LOWER, ...GREEK_UPPER, ...HEBREW, ...SPECIAL, ...FRAK, ...CAL, ...BBOLD, ...SF, ...TT, ...BIGOP_ATOMS];
const ATOMS_FULL = [...ATOMS]; // immutable backup for restoration in themed mode

let BINOPS = ['\\otimes','\\oplus','\\wedge','\\vee','\\circ','\\star','\\cdot','\\boxtimes','\\boxplus','\\boxdot','\\divideontimes','\\ltimes','\\rtimes','\\intercal','\\curlywedge','\\curlyvee','\\barwedge','\\veebar','\\amalg','\\smile','\\frown','\\bullet'];
const BINOPS_FULL = [...BINOPS];

const RELS = ['\\to','\\leftarrow','\\leftrightarrow','\\Rightarrow','\\Leftarrow','\\mapsto','\\hookrightarrow','\\twoheadrightarrow','\\rightharpoonup','\\rightleftharpoons','\\longrightarrow','\\longmapsto','\\equiv','\\sim','\\simeq','\\approx','\\cong','\\propto','\\preceq','\\succeq','\\subset','\\supset','\\sqsubset','\\sqsupset','\\models','\\vdash','\\dashv','\\bowtie'];
const MTYPES = ['vmatrix','pmatrix','bmatrix','Vmatrix','Bmatrix','matrix'];
const ACCENTS = ['\\hat','\\tilde','\\bar','\\vec','\\dot','\\ddot','\\breve','\\acute','\\grave','\\check','\\widehat','\\widetilde','\\overline'];
const DELIMPAIRS = [
  ['\\left(','\\right)'],['\\left[','\\right]'],['\\left\\{','\\right\\}'],
  ['\\left|','\\right|'],['\\left\\lfloor','\\right\\rfloor'],
  ['\\left\\lceil','\\right\\rceil'],['\\left\\langle','\\right\\rangle'],
  ['\\left\\|','\\right\\|']
];
const BIGOPS = ['\\prod','\\sum','\\bigotimes','\\bigoplus','\\bigcap','\\bigcup','\\bigsqcup','\\bigwedge','\\bigvee','\\coprod'];
const SPACING = ['\\,','\\:','\\;','\\!','\\quad','\\qquad'];
const STYLE_WRAPS = ['\\boldsymbol','\\mathbf','\\mathit'];

// decorated atom
function atom() {
  let s = pick(ATOMS);
  const layerProb = Math.min(0.7, 0.30 * SPICE);
  if (maybe(layerProb)) {
    const maxLayers = Math.min(6, Math.max(1, Math.round(4 * SPICE)));
    const layers = rnd(1, maxLayers);
    for (let i = 0; i < layers; i++) s = `${pick(ACCENTS)}{${s}}`;
  }
  if (maybe(0.10 * SPICE)) s = `${pick(STYLE_WRAPS)}{${s}}`;
  return s;
}

function spacedJoin(parts, op) {
  if (!maybe(0.4)) return parts.join(` ${op} `);
  return parts.map((p, i) => i === 0 ? p : `${pick(SPACING)} ${op} ${pick(SPACING)} ${p}`).join('');
}

// ---- PRODUCTIONS (weighted, modulated by personality) ----
const PRODUCTIONS = [
  { name: 'frac',    base: 0.10, fn: d => `\\frac{${expr(d-1)}}{${expr(d-1)}}` },
  { name: 'cfrac',   base: 0.04, fn: d => {
      let s = expr(1);
      const n = Math.min(rnd(2, 4), Math.max(1, d));
      for (let i = 0; i < n; i++) s = `\\cfrac{${expr(1)}}{${expr(1)} + ${s}}`;
      return s;
  }},
  { name: 'sup',     base: 0.08, fn: d => `{${expr(d-1)}}^{${expr(d-1)}}` },
  { name: 'sub',     base: 0.06, fn: d => `{${expr(d-1)}}_{${expr(d-1)}}` },
  { name: 'subsup',  base: 0.06, fn: d => `{${expr(d-1)}}_{${expr(d-1)}}^{${expr(d-1)}}` },
  { name: 'sqrt',    base: 0.06, fn: d => `\\sqrt{${expr(d-1)}}` },
  { name: 'sqrtN',   base: 0.04, fn: d => `\\sqrt[${atom()}]{${expr(d-1)}}` },
  { name: 'underbr', base: 0.06, fn: d => `\\underbrace{${expr(d-1)}}_{${expr(d-1)}}` },
  { name: 'overbr',  base: 0.06, fn: d => `\\overbrace{${expr(d-1)}}^{${expr(d-1)}}` },
  { name: 'delim',   base: 0.06, fn: d => { const [l,r] = pick(DELIMPAIRS); return `${l} ${expr(d-1)} ${r}`; }},
  { name: 'bigop',   base: 0.05, fn: d => { const op = pick(BIGOPS); return `${op}_{${expr(d-2)}}^{${expr(d-2)}} {${expr(d-1)}}`; }},
  { name: 'cancel',  base: 0.04, fn: d => maybe(0.5) ? `\\cancel{${expr(d-1)}}` : `\\xcancel{${expr(d-1)}}` },
  { name: 'overset', base: 0.04, fn: d => maybe(0.5) ? `\\overset{${expr(d-2)}}{${expr(d-1)}}` : `\\underset{${expr(d-2)}}{${expr(d-1)}}` },
  { name: 'xarrow',  base: 0.03, fn: d => { const a = maybe(0.5) ? '\\xrightarrow' : '\\xleftarrow'; return `${a}[${atom()}]{${expr(d-2)}}`; }},
  { name: 'matrix',  base: 0.05, fn: d => {
      // tight cap — matrices nested inside expr blow up fast.
      if (d < 3) return atom();
      const rows = rnd(2, 3), cols = rnd(2, 3), t = pick(MTYPES);
      const cellExpr = () => d <= 3 ? atom() : expr(d-2);
      let body = '';
      for (let i = 0; i < rows; i++) {
        body += Array(cols).fill(null).map(cellExpr).join(' & ');
        if (i < rows-1) body += ' \\\\ ';
      }
      return `\\begin{${t}} ${body} \\end{${t}}`;
  }},
  { name: 'binom',   base: 0.03, fn: d => `\\binom{${expr(d-1)}}{${expr(d-1)}}` },
  { name: 'cases',   base: 0.03, fn: d => {
      if (d < 2) return atom();
      const n = rnd(2, 3);
      let body = '';
      for (let i = 0; i < n; i++) {
        body += `${expr(d-2)} & ${expr(d-2)}`;
        if (i < n-1) body += ' \\\\ ';
      }
      return `\\begin{cases} ${body} \\end{cases}`;
  }},
  { name: 'chain',   base: 0.07, fn: d => {
      const cap = d > 5 ? 3 : 5;
      return spacedJoin(Array(rnd(2, cap)).fill(null).map(() => expr(d-1)), pick(BINOPS));
  }},
  { name: 'rel',     base: 0.04, fn: d => `${expr(d-1)} ${pick(RELS)} ${expr(d-1)}` },
  { name: 'atom',    base: 0.07, fn: d => atom() },
];

// per-block personality biases production weights
let personality = null;

function makePersonality() {
  const p = {};
  PRODUCTIONS.forEach(prod => p[prod.name] = 1);
  // amplify 1-3 productions
  const amped = pickN(PRODUCTIONS, rnd(1, 3));
  amped.forEach(prod => p[prod.name] = 2 + rand() * 4);
  // suppress 1-2 different productions
  const remaining = PRODUCTIONS.filter(x => !amped.includes(x));
  const suppressed = pickN(remaining, rnd(1, 2));
  suppressed.forEach(prod => p[prod.name] = 0.15);
  return p;
}

function expr(d) {
  if (d <= 0 || exprBudget <= 0) return atom();
  exprBudget--;
  const weights = PRODUCTIONS.map(p => p.base * (personality ? personality[p.name] : 1));
  const prod = wpick(PRODUCTIONS, weights);
  return prod.fn(d);
}

// ---- TOP-LEVEL SHAPES ----
// each entry: { name, fn }. name is shown in the algorithm dropdown.
const SHAPES = [
  { name: 'matrix fractal', fn: () => {
    function recM(d) {
      const r = rnd(2, 4), c = rnd(2, 4), t = pick(MTYPES);
      let body = '';
      for (let i = 0; i < r; i++) {
        body += Array(c).fill(null).map(() => d > 1 ? expr(depth(2)) : atom()).join(' & ');
        if (i < r-1) body += ' \\\\ ';
      }
      const m = `\\begin{${t}} ${body} \\end{${t}}`;
      return d <= 0 ? m : `${m}^{${recM(d-1)}^{\\cdots}}`;
    }
    return recM(rnd(1, 3));
  }},
  { name: 'subscript tower', fn: () => {
    function subT(e, d) { return d <= 0 ? e : `${e}_{${subT(expr(depth(3)), d-1)}}`; }
    const op = pick(BINOPS), d = depth(rnd(6, 10));
    return `${subT(atom(), d)} ${op} ${subT(atom(), d)} ${op} ${subT(atom(), d)}`;
  }},
  { name: 'superscript tower', fn: () => {
    function supT(e, d) { return d <= 0 ? e : `${e}^{${supT(expr(depth(3)), d-1)}}`; }
    const d = depth(rnd(6, 10));
    return `${supT(atom(), d)} \\qquad ${supT(atom(), d)} \\qquad ${supT(atom(), d)}`;
  }},
  { name: 'brace tower', fn: () => {
    function uoT(body, d) {
      if (d <= 0) return body;
      const inner = uoT(body, d-1);
      return d % 2 === 0 ? `\\overbrace{${inner}}^{${expr(depth(3))}}` : `\\underbrace{${inner}}_{${expr(depth(3))}}`;
    }
    const chain = Array(rnd(4, 8)).fill(null).map(() => expr(depth(4))).join(` ${pick(BINOPS)} `);
    return uoT(chain, depth(rnd(5, 9)));
  }},
  { name: 'sqrt nest', fn: () => {
    function sqC(fill, d) { return d <= 0 ? fill : `\\sqrt{${sqC(fill, d-1)}}`; }
    const fill = maybe(0.5)
      ? rep(pick(['\\oint','\\nabla','\\partial','\\int']), rnd(6, 12))
      : Array(rnd(3, 6)).fill(null).map(() => expr(depth(3))).join(` ${pick(BINOPS)} `);
    return sqC(fill, depth(rnd(6, 10)));
  }},
  { name: 'frac tree', fn: () => {
    function fT(d) { if (d <= 0) return expr(depth(3)); const i = fT(d-1); return `\\frac{${i}}{${i}}`; }
    return `\\frac{${fT(depth(4))}}{${fT(depth(4))}}`;
  }},
  { name: 'bigop tower', fn: () => {
    function opT(base, d) {
      return d <= 0 ? `${base}_{${expr(depth(3))}}^{${expr(depth(3))}} {${expr(depth(4))}}` : `${base}_{${opT(base, d-1)}}^{${expr(depth(3))}}`;
    }
    return `${opT(pick(BIGOPS), depth(rnd(4, 7)))} \\qquad ${opT(pick(BIGOPS), depth(rnd(4, 7)))}`;
  }},
  { name: 'wide matrix', fn: () => {
    const rows = rnd(4, 6), cols = rnd(4, 6), t = pick(MTYPES);
    let body = '';
    for (let i = 0; i < rows; i++) {
      body += Array(cols).fill(null).map(() => expr(depth(2))).join(' & ');
      if (i < rows-1) body += ' \\\\ ';
    }
    return `\\begin{${t}} ${body} \\end{${t}}`;
  }},
  { name: 'chain w/ matrix', fn: () => {
    const chain = Array(rnd(4, 7)).fill(null).map(() => expr(depth(3))).join(` ${pick(BINOPS)} `);
    const rows = rnd(2, 3), cols = rnd(2, 3), t = pick(MTYPES);
    let body = '';
    for (let i = 0; i < rows; i++) {
      body += Array(cols).fill(null).map(() => expr(depth(2))).join(' & ');
      if (i < rows-1) body += ' \\\\ ';
    }
    return `\\underbrace{${chain}}_{\\begin{${t}} ${body} \\end{${t}}}`;
  }},
  { name: 'accent storm', fn: () => {
    let e = expr(depth(5));
    const layers = rnd(2, 6);
    for (let i = 0; i < layers; i++) {
      e = maybe(0.5) ? `${pick(ACCENTS)}{${e}}` : `${e}^{${pick(ACCENTS)}{${atom()}}} ${pick(BINOPS)} ${pick(ACCENTS)}{${expr(depth(3))}}`;
    }
    return e;
  }},
  { name: 'contour nest', fn: () => {
    function ointN(d) {
      if (d <= 0) return `${pick(['\\oint','\\iint','\\iiint','\\oiint'])} d\\xi`;
      const [l, r] = pick(DELIMPAIRS);
      return `${pick(['\\oint','\\iint','\\iiint'])}_{${expr(depth(3))}} ${l} ${ointN(d-1)} ${r}`;
    }
    return ointN(depth(rnd(4, 7)));
  }},
  { name: 'pure grammar', fn: () => expr(depth(7)) },
  { name: 'cases', fn: () => {
    const n = rnd(3, 5);
    let body = '';
    for (let i = 0; i < n; i++) {
      body += `${expr(depth(3))} & ${expr(depth(3))}`;
      if (i < n-1) body += ' \\\\ ';
    }
    return `${expr(depth(3))} = \\begin{cases} ${body} \\end{cases}`;
  }},
  { name: 'aligned', fn: () => {
    const n = rnd(3, 6);
    let lines = [];
    for (let i = 0; i < n; i++) lines.push(`${expr(depth(4))} &${pick(RELS)} ${expr(depth(4))}`);
    return `\\begin{aligned} ${lines.join(' \\\\ ')} \\end{aligned}`;
  }},
  { name: 'gathered', fn: () => {
    const n = rnd(3, 6);
    let lines = [];
    for (let i = 0; i < n; i++) lines.push(expr(depth(4)));
    return `\\begin{gathered} ${lines.join(' \\\\ ')} \\end{gathered}`;
  }},
  { name: 'continued fraction', fn: () => {
    let s = expr(depth(2));
    const n = rnd(4, 8);
    for (let i = 0; i < n; i++) s = `\\cfrac{${expr(depth(2))}}{${expr(depth(2))} + ${s}}`;
    return s;
  }},
  { name: 'self-underbrace', fn: () => {
    function self(d) { if (d <= 0) return atom(); return `\\underbrace{${expr(depth(3))}}_{${self(d-1)}}`; }
    return self(rnd(4, 7));
  }},
  { name: 'binomial nest', fn: () => {
    function bT(d) { if (d <= 0) return atom(); return `\\binom{${bT(d-1)}}{${bT(d-1)}}`; }
    return bT(rnd(3, 5));
  }},
  { name: 'overset rings', fn: () => {
    let core = expr(depth(2));
    const n = rnd(4, 8);
    for (let i = 0; i < n; i++) core = maybe(0.5) ? `\\overset{${atom()}}{${core}}` : `\\underset{${atom()}}{${core}}`;
    return core;
  }},
  { name: 'glyph lattice', fn: () => {
    const r = rnd(5, 8), c = rnd(5, 9), t = pick(MTYPES);
    let body = '';
    for (let i = 0; i < r; i++) { body += Array(c).fill(null).map(() => atom()).join(' & '); if (i < r-1) body += ' \\\\ '; }
    return `\\begin{${t}} ${body} \\end{${t}}`;
  }},
  { name: 'operator wall', fn: () => {
    const op = pick(['\\oint','\\iint','\\iiint','\\int','\\sum','\\prod','\\bigotimes']);
    const rows = rnd(3, 6);
    let lines = [];
    for (let i = 0; i < rows; i++) lines.push(rep(op, rnd(6, 14)));
    return `\\begin{matrix} ${lines.join(' \\\\ ')} \\end{matrix}`;
  }},
  { name: 'delimiter abyss', fn: () => {
    function dN(d) { if (d <= 0) return expr(depth(3)); const [l,r] = pick(DELIMPAIRS); return `${l} ${dN(d-1)} ${r}`; }
    return dN(depth(rnd(6, 12)));
  }},
  { name: 'tensor field', fn: () => {
    const r = rnd(3, 5), c = rnd(3, 5);
    let body = '';
    for (let i = 0; i < r; i++) { body += Array(c).fill(null).map(() => `{${atom()}}_{${atom()}}^{${atom()}}`).join(' & '); if (i < r-1) body += ' \\\\ '; }
    return `\\begin{bmatrix} ${body} \\end{bmatrix}`;
  }},
];

// selected algorithm: null = random, otherwise the SHAPES entry name.
let selectedAlgo = null;

function pickShapeFn() {
  if (selectedAlgo) {
    const found = SHAPES.find(s => s.name === selectedAlgo);
    if (found) return found.fn;
  }
  return pick(SHAPES).fn;
}

function generateBlock() {

}

function appendBlocks(strs) {

function flashBtn(id) {

// ---- COORDINATED SET ----
// pick a constrained palette of atoms + ops, generate N blocks under the same theme
function generateSet() {
  newSeed();
  const themeAtoms = pickN(ATOMS_FULL, rnd(3, 5));
  const themeOps   = pickN(BINOPS_FULL, rnd(1, 2));
  const themeShapes = pickN(SHAPES, rnd(3, 5));
  const count = rnd(4, 7);

  // swap out global pools for the theme
  const savedA = ATOMS.splice(0, ATOMS.length, ...themeAtoms);
  const savedB = BINOPS.splice(0, BINOPS.length, ...themeOps);

  const blocks = [];
  try {
    for (let i = 0; i < count; i++) {
      personality = makePersonality();
      exprBudget = 800;
      blocks.push(`$$\n${pick(themeShapes).fn()}\n$$`);
    }
  } finally {
    ATOMS.splice(0, ATOMS.length, ...savedA);
    BINOPS.splice(0, BINOPS.length, ...savedB);
  }

  appendBlocks(blocks);
  flashBtn('btn-gset');
}

// ---- CROSSOVER ----
// splice a subtree from one block into another at a random brace position
function findBraceGroups(s) {
  const groups = [];
  for (let i = 0; i < s.length; i++) {
    if (s[i] === '{') {
      let d = 1;
      for (let j = i + 1; j < s.length; j++) {
        if (s[j] === '{') d++;
        else if (s[j] === '}') {
          d--;
          if (d === 0) { groups.push({ start: i, end: j, content: s.slice(i+1, j) }); break; }
        }
      }
    }
  }
  return groups;
}

function crossover(a, b) {
  const ga = findBraceGroups(a);
  const gb = findBraceGroups(b);
  if (!ga.length || !gb.length) return a;
  const tA = ga[Math.floor(rand() * ga.length)];
  const sB = gb[Math.floor(rand() * gb.length)];
  return a.slice(0, tA.start + 1) + sB.content + a.slice(tA.end);
}

function crossoverBlocks() {
  const blocks = extractBlocks(editor.value);
  if (blocks.length < 2) { status.textContent = 'need 2+'; setTimeout(() => render(), 1400); return; }
  newSeed();
  const a = blocks[blocks.length - 2];
  const b = blocks[blocks.length - 1];
  // generate two children — one each direction
  const child1 = crossover(a, b);
  const child2 = crossover(b, a);
  appendBlocks([`$$\n${child1}\n$$`, `$$\n${child2}\n$$`]);
  flashBtn('btn-cross');
}

// initial seed display
updateSeedDisplay();

// populate algorithm dropdown
(function initAlgoSelect() {
  const sel = document.getElementById('algo-sel');
  if (!sel) return;
  const opts = ['<option value="">random</option>'];
  SHAPES.forEach(s => opts.push(`<option value="${s.name}">${s.name}</option>`));
  sel.innerHTML = opts.join('');
  sel.addEventListener('change', e => { selectedAlgo = e.target.value || null; });
})();

// ==================== UTILITY BUTTONS ====================
function stamp() { return Date.now().toString(36); }
function flash(msg) { status.textContent = msg; setTimeout(() => { status.textContent = currentBlocks.length || ''; }, 1200); }

function clearAll() {
  pushHistory();
  editor.value = '';
  currentBlocks = [];
  draw();
  status.textContent = '';
  persist();
}
function copySource() { navigator.clipboard.writeText(editor.value).then(() => flash('⎘')); }
function saveTxt() {
  const b = new Blob([editor.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'bm-' + stamp() + '.txt'; a.click();
  flash('↓');
}

// ---- raster the current composition onto an offscreen sheet at given dpi ----
function rasterSheet(dpi) {
  const { win, hin } = paperDims();
  const pw = Math.max(1, Math.round(win * dpi)), ph = Math.max(1, Math.round(hin * dpi));
  const pc = document.createElement('canvas');
  pc.width = pw; pc.height = ph;
  const pctx = pc.getContext('2d');
  composeTo(pctx, pw, ph);
  if (thermal) threshold1bit(pctx, pw, ph);
  return pc;
}

function threshold1bit(c, W, H) {
  const d = c.getImageData(0, 0, W, H), p = d.data;
  for (let i = 0; i < p.length; i += 4) {
    const lum = 0.299 * p[i] + 0.587 * p[i + 1] + 0.114 * p[i + 2];
    const bw = lum < 128 ? 0 : 255;
    p[i] = p[i + 1] = p[i + 2] = bw; p[i + 3] = 255;
  }
  c.putImageData(d, 0, 0);
}

function exportPng() {
  const pc = rasterSheet(300);
  pc.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download = 'bm-' + stamp() + '.png'; a.click();
  });
  flash('▣');
}

// ---- vector svg export : compose cached block svgs with transforms ----
function nsInner(inner, pfx) {
  return inner
    .replace(/id="([^"]+)"/g, 'id="' + pfx + '$1"')
    .replace(/href="#([^"]+)"/g, 'href="#' + pfx + '$1"')
    .replace(/xlink:href="#([^"]+)"/g, 'xlink:href="#' + pfx + '$1"')
    .replace(/url\(#([^)]+)\)/g, 'url(#' + pfx + '$1)');
}
function buildSvg(W, H) {
  const sg = g, sGW = GW, sGH = GH;
  RECORD = true; recPlacements = []; GW = W; GH = H;
  compose();
  RECORD = false; g = sg; GW = sGW; GH = sGH;

  const placements = recPlacements.filter(p => !p.mark);
  const marks = recPlacements.filter(p => p.mark);
  const uniq = [...new Set(placements.map(p => p.b))];
  const idOf = new Map(); uniq.forEach((b, i) => idOf.set(b, 'b' + i));
  const defs = uniq.map(b => {
    const id = idOf.get(b);
    return '<symbol id="' + id + '" viewBox="' + b.vb + '" overflow="visible">' + nsInner(b.inner, id + '-') + '</symbol>';
  }).join('');
  const body = placements.map(p => {
    const id = idOf.get(p.b);
    const cx = (p.x + p.w / 2).toFixed(2), cy = (p.y + p.h / 2).toFixed(2);
    const tf = p.rot ? ' transform="rotate(' + p.rot.toFixed(3) + ' ' + cx + ' ' + cy + ')"' : '';
    const bl = p.blend !== 'source-over' ? 'mix-blend-mode:' + BLEND_LABEL[p.blend] + ';' : '';
    return '<use href="#' + id + '" x="' + p.x.toFixed(2) + '" y="' + p.y.toFixed(2) +
           '" width="' + p.w.toFixed(2) + '" height="' + p.h.toFixed(2) + '" opacity="' + p.alpha + '" style="' + bl + '"' + tf + '/>';
  }).join('');
  const markStr = marks.map(p =>
    '<path d="M ' + p.x + ' ' + (p.y + p.sy * p.m) + ' L ' + p.x + ' ' + p.y + ' L ' + (p.x + p.sx * p.m) + ' ' + p.y +
    '" stroke="' + p.col + '" stroke-width="' + p.lw + '" fill="none" opacity="0.8"/>'
  ).join('');
  const vp = 'translate(' + (W / 2) + ' ' + (H / 2) + ') scale(' + viewport.zoom + ') translate(' + (-W / 2 + viewport.panX * W) + ' ' + (-H / 2 + viewport.panY * H) + ') ';
  const gt = vp + 'translate(' + (W / 2) + ' ' + (H / 2) + ') rotate(' + rotation + ') scale(' + (mirrorH ? -1 : 1) + ' ' + (mirrorV ? -1 : 1) + ') translate(' + (-W / 2) + ' ' + (-H / 2) + ')' +
    (overprint.on ? ' translate(' + (overprint.offX / 100 * W) + ' ' + (overprint.offY / 100 * H) + ')' : '');
  const inner = invert ? '<g style="filter:invert(1)">' + body + '</g>' : body;
  return '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">\n' +
    '<defs>' + defs + '</defs>\n' +
    '<rect width="' + W + '" height="' + H + '" fill="' + bgColor() + '"/>\n' +
    '<g transform="' + gt + '">' + inner + '</g>\n' + markStr + '\n</svg>';
}
function exportSvg() {
  const { win, hin } = paperDims();
  const W = Math.round(win * 96), H = Math.round(hin * 96);
  const svg = buildSvg(W, H);
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'bm-' + stamp() + '.svg'; a.click();
  flash('▱');
}

// ---- print : single sheet-sized raster + matching @page ----
function setPageStyle(win, hin) {
  let s = document.getElementById('page-style');
  if (!s) { s = document.createElement('style'); s.id = 'page-style'; document.head.appendChild(s); }
  s.textContent = '@page { size: ' + win.toFixed(3) + 'in ' + hin.toFixed(3) + 'in; margin: 0; }';
}
function printView() {
  const { win, hin } = paperDims();
  const dpi = thermal ? 203 : 300;
  const pc = rasterSheet(dpi);
  const img = document.querySelector('#print-layer img');
  img.onload = () => setTimeout(() => window.print(), 50);
  img.src = pc.toDataURL('image/png');
  setPageStyle(win, hin);
  printCount++;
  const pcEl = document.getElementById('print-count');
  if (pcEl) pcEl.textContent = '×' + printCount;
  const p = PAPERS[paper] || PAPERS.letter;
  flash(p.label + (thermal ? ' 1-bit' : '') + ' · 1 page · #' + printCount);
}

function toggleFs() {
  document.body.classList.toggle('fs');
  fsbtn.textContent = document.body.classList.contains('fs') ? '⤡' : '⤢';
  setTimeout(draw, 60);
}

// ==================== INIT ====================
function init() {
  wireControls();
  const hadText = restore();
  if (!hadText && !editor.value.trim()) editor.value = SEED;
  syncUI();
  updateSeedDisplay();
  if (mode === 'animate') startAnim();
  render();
  let rt = null;
  new ResizeObserver(() => {
    clearTimeout(rt);
    rt = setTimeout(() => { if (mode !== 'animate') draw(); }, 80);
  }).observe(canvas.parentElement);
  window.addEventListener('resize', () => { if (mode !== 'animate') draw(); });
}
window.addEventListener('load', init);
</script>
